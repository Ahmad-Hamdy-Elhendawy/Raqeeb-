<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>راقب — سجّل موقعك</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 2.5rem;
      width: 100%;
      max-width: 480px;
    }
    .logo { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.5rem; }
    .logo-mark {
      width: 34px; height: 34px;
      background: #f5a623; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; font-weight: 900; color: #000;
    }
    h1 { font-size: 1.4rem; font-weight: 800; }
    p.sub { color: #888; font-size: 0.88rem; margin-bottom: 2rem; margin-top: 0.4rem; line-height: 1.6; }
    label { display: block; font-size: 0.85rem; color: #aaa; margin-bottom: 0.4rem; font-weight: 500; }
    input {
      width: 100%;
      padding: 0.7rem 1rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.95rem;
      font-family: 'Tajawal', sans-serif;
      margin-bottom: 0.4rem;
      outline: none;
      transition: border-color 0.2s;
      direction: ltr;
      text-align: right;
    }
    input:focus { border-color: #f5a623; }
    .hint {
      font-size: 0.72rem;
      color: #555;
      margin-bottom: 1.2rem;
      line-height: 1.5;
    }
    .hint a { color: #f5a623; text-decoration: none; }
    .spacer { margin-bottom: 1.2rem; }
    button {
      width: 100%;
      padding: 0.85rem;
      background: #f5a623;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      font-family: 'Tajawal', sans-serif;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    button:hover { background: #d4891a; }
    #status {
      margin-top: 1rem;
      font-size: 0.88rem;
      text-align: center;
      min-height: 1.2rem;
      line-height: 1.6;
    }
    .success { color: #4caf50; }
    .error   { color: #f44336; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-mark">ر</div>
      <h1>راقب</h1>
    </div>
    <p class="sub">هنراقب موقعك ونبعتلك فوراً لو حصل أي حاجة.</p>

    <label>Telegram Chat ID بتاعك (صاحب الموقع)</label>
    <input type="text" id="user_telegram_id" placeholder="123456789" />
    <div class="hint">
      مش عارف الـ ID بتاعك؟ ابعت <b>/start</b> لـ <a href="https://t.me/userinfobot" target="_blank">@userinfobot</a> على تيليجرام وهيظهرلك دا. 
<br>
	@Praisefr
	<br>Id: NUMBER <----------- هو دا الرقم اللي هتدخله
	<br>First: Ahmad
	<br>Lang: en
	<br>Registered: Check Date
    </div>

    <label>Telegram Chat ID بتاع المطور</label>
    <input type="text" id="dev_telegram_id" placeholder="987654321" />
    <div class="spacer"></div>

    <label>رابط الموقع</label>
    <input type="url" id="website_url" placeholder="https://yoursite.com" />
    <div class="spacer"></div>

    <label>ميزانية الإعلانات الشهرية (جنيه)</label>
    <input type="number" id="monthly_ad_spend" placeholder="5000" />

    <button onclick="register()">سجّل الموقع</button>
    <div id="status"></div>
  </div>

  <script>
    // ⚠️ استبدل هذا برابط الـ API من terraform apply
    const API_URL = "https://wzoi8ew27l.execute-api.eu-north-1.amazonaws.com/prod/register";

    async function register() {
      const status = document.getElementById("status");
      status.textContent = "جاري التسجيل...";
      status.className = "";

      const payload = {
        user_telegram_id: document.getElementById("user_telegram_id").value.trim(),
        dev_telegram_id:  document.getElementById("dev_telegram_id").value.trim(),
        website_url:      document.getElementById("website_url").value.trim(),
        monthly_ad_spend: document.getElementById("monthly_ad_spend").value.trim()
      };

      if (Object.values(payload).some(v => !v)) {
        status.textContent = "من فضلك املا كل الحقول.";
        status.className = "error";
        return;
      }

      try {
        const res  = await fetch(API_URL, {
          method:  "POST",
          headers: { "Content-Type": "application/json" },
          body:    JSON.stringify(payload)
        });
        const data = await res.json();

        if (res.ok) {
          status.textContent = "✓ تم التسجيل! هتوصلك رسالة على تيليجرام لو الموقع وقع.";
          status.className = "success";
        } else {
          status.textContent = "خطأ: " + (data.error || "حصلت مشكلة، حاول تاني.");
          status.className = "error";
        }
      } catch (e) {
        status.textContent = "مشكلة في الاتصال. تأكد من رابط الـ API.";
        status.className = "error";
      }
    }
  </script>
</body>
</html>
