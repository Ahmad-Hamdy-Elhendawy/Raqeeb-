<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>راقب — لوحة تحكم المواقع</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    /* ══════════════════════════════════════════════════════
       راقب — TERMINAL / OSCILLOSCOPE CONSOLE
       A monitoring dashboard that looks like the instrument
       it is: a phosphor screen watching your sites' vitals.
       ══════════════════════════════════════════════════════ */

    :root {
      --bg:           #060704;
      --screen:       #0b0d09;
      --screen2:      #10130d;
      --bezel:        #020201;
      --line:         #24281f;
      --line2:        #343a2b;
      --amber:        #ffb300;
      --amber-dim:    #8a5f00;
      --amber-hi:     #ffd166;
      --amber-glow:   rgba(255,179,0,0.16);
      --amber-glow2:  rgba(255,179,0,0.07);
      --green:        #3dff7a;
      --green-glow:   rgba(61,255,122,0.18);
      --red:          #ff3b3b;
      --red-glow:     rgba(255,59,59,0.2);
      --yellow:       #f5d90a;
      --text:         #f3e6c8;
      --text2:        #9b9078;
      --text3:        #55503f;
      --mono:         'IBM Plex Mono', monospace;
      --arabic:       'Tajawal', sans-serif;
      --radius:       3px;
      --radius-sm:    2px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
    }

    body {
      font-family: var(--arabic);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── CRT SCREEN LAYER: scanlines + vignette + flicker ── */
    .crt {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
    }
    .crt::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        180deg,
        rgba(0,0,0,0.16) 0px,
        rgba(0,0,0,0.16) 1px,
        transparent 1px,
        transparent 3px
      );
      mix-blend-mode: multiply;
      animation: scanDrift 9s linear infinite;
    }
    .crt::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 65% at 50% 45%, transparent 55%, rgba(0,0,0,0.55) 100%);
    }
    @keyframes scanDrift {
      0%   { background-position: 0 0; }
      100% { background-position: 0 120px; }
    }
    .flicker {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 49;
      background: var(--amber-glow2);
      opacity: 0;
      animation: flick 6.5s steps(1) infinite;
    }
    @keyframes flick {
      0%, 91%, 100% { opacity: 0; }
      92% { opacity: 0.35; }
      93% { opacity: 0.05; }
      94% { opacity: 0.25; }
      95% { opacity: 0; }
    }

    /* ── AMBIENT BLOOM ── */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .ambient::before {
      content: '';
      position: absolute;
      top: -260px; left: 50%;
      transform: translateX(-50%);
      width: 1100px; height: 560px;
      background: radial-gradient(ellipse, rgba(255,179,0,0.10) 0%, transparent 68%);
    }
    .ambient::after {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,179,0,0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,179,0,0.028) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(ellipse 900px 500px at 50% 0%, black 0%, transparent 78%);
      -webkit-mask-image: radial-gradient(ellipse 900px 500px at 50% 0%, black 0%, transparent 78%);
    }

    /* ── HEADER ── */
    header {
      position: relative;
      z-index: 10;
      padding: 1.5rem 2.5rem;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(180deg, rgba(255,179,0,0.045) 0%, transparent 100%);
    }

    .logo { display: flex; align-items: center; gap: 0.9rem; }

    .logo-mark-wrap { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
    .logo-mark-wrap::before {
      content: '';
      position: absolute; inset: -6px;
      border: 1px solid var(--amber);
      border-radius: 50%;
      opacity: 0;
      animation: radarPing 3s ease-out infinite;
    }
    @keyframes radarPing {
      0%   { transform: scale(0.7); opacity: 0.6; }
      100% { transform: scale(1.6); opacity: 0; }
    }

    .logo-mark {
      position: relative;
      width: 42px; height: 42px;
      background: var(--screen);
      border: 1px solid var(--amber-dim);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono);
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--amber);
      text-shadow: 0 0 12px var(--amber-glow);
      z-index: 1;
    }

    .logo-text-row { display: flex; align-items: baseline; gap: 2px; }
    .logo-text {
      font-size: 1.55rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      color: var(--amber-hi);
      text-shadow: 0 0 18px var(--amber-glow), 0 0 2px var(--amber-glow);
    }
    .logo-cursor {
      display: inline-block;
      width: 9px; height: 1.2rem;
      background: var(--amber);
      margin-right: 4px;
      animation: cursorBlink 1s steps(1) infinite;
      box-shadow: 0 0 10px var(--amber-glow);
    }
    @keyframes cursorBlink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }

    .logo-sub {
      font-size: 0.7rem;
      color: var(--text3);
      font-family: var(--mono);
      font-weight: 500;
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    .header-right { display: flex; align-items: center; gap: 1rem; }

    .live-chip {
      display: flex; align-items: center; gap: 0.5rem;
      border: 1px solid rgba(61,255,122,0.3);
      color: var(--green);
      padding: 0.32rem 0.7rem;
      border-radius: var(--radius-sm);
      font-size: 0.68rem;
      font-family: var(--mono);
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulseGreen 2s infinite;
    }

    .last-update {
      font-size: 0.72rem;
      color: var(--text3);
      font-family: var(--mono);
    }

    .refresh-btn {
      display: flex; align-items: center; gap: 0.4rem;
      background: var(--screen);
      border: 1px solid var(--line2);
      color: var(--text2);
      padding: 0.5rem 0.9rem;
      border-radius: var(--radius-sm);
      font-family: var(--mono);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .refresh-btn:hover {
      border-color: var(--amber);
      color: var(--amber);
      box-shadow: 0 0 0 1px var(--amber-glow2), 0 0 16px var(--amber-glow2);
    }
    .refresh-btn:active { transform: scale(0.96); }

    /* ── EKG HERO STRIP (signature element) ── */
    .ekg-strip {
      position: relative;
      z-index: 10;
      height: 54px;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
      background: var(--bezel);
    }
    .ekg-track {
      position: absolute;
      top: 50%;
      right: 0;
      transform: translateY(-50%);
      height: 54px;
      width: 4000px;
      display: flex;
      animation: ekgScroll 11s linear infinite;
      filter: drop-shadow(0 0 6px var(--amber-glow));
    }
    .ekg-track svg { display: block; height: 54px; width: 2000px; flex-shrink: 0; }
    @keyframes ekgScroll {
      0%   { transform: translateY(-50%) translateX(0); }
      100% { transform: translateY(-50%) translateX(2000px); }
    }

    /* ── SUMMARY BAR ── */
    .summary-bar {
      position: relative;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--line);
      background: var(--screen);
    }

    .summary-item {
      position: relative;
      padding: 1.3rem 2rem;
      border-left: 1px solid var(--line);
      display: flex; flex-direction: column; gap: 0.3rem;
      transition: background 0.2s;
    }
    .summary-item:last-child { border-left: none; }
    .summary-item:hover { background: var(--amber-glow2); }

    .summary-label {
      font-size: 0.66rem;
      color: var(--text3);
      font-family: var(--mono);
      font-weight: 500;
      letter-spacing: 0.04em;
    }
    .summary-label::before { content: '// '; color: var(--line2); }

    .summary-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      color: var(--text);
      font-family: var(--mono);
      font-variant-numeric: tabular-nums;
    }
    .summary-value.green { color: var(--green); text-shadow: 0 0 22px var(--green-glow); }
    .summary-value.red   { color: var(--red);   text-shadow: 0 0 22px var(--red-glow); }
    .summary-value.amber { color: var(--amber); text-shadow: 0 0 22px var(--amber-glow); }

    /* ── MAIN ── */
    main {
      position: relative;
      z-index: 10;
      padding: 2.25rem 2.5rem 3rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .section-title {
      display: flex; align-items: baseline; gap: 0.5rem;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text2);
      margin-bottom: 1.4rem;
      font-family: var(--arabic);
    }
    .section-title .prompt { font-family: var(--mono); color: var(--amber); }
    .section-title .blink {
      display: inline-block; width: 7px; height: 1rem;
      background: var(--amber);
      animation: cursorBlink 1s steps(1) infinite;
      margin-right: 2px;
    }

    /* ── SITE CARDS: monitor units ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
      gap: 1.25rem;
    }

    .site-card {
      position: relative;
      background: var(--screen);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      animation: cardIn 0.45s ease both;
    }
    .site-card::before, .site-card::after,
    .card-header .corner-tl, .card-header .corner-tr { display: none; }
    .site-card:hover { transform: translateY(-2px); border-color: var(--line2); }
    .site-card.is-down {
      border-color: rgba(255,59,59,0.45);
      box-shadow: 0 0 26px rgba(255,59,59,0.08), inset 0 0 40px rgba(255,59,59,0.04);
    }
    .site-card.is-down:hover { border-color: rgba(255,59,59,0.65); }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── CARD HEADER: device chassis bar ── */
    .card-header {
      padding: 0.85rem 1.1rem;
      display: flex; align-items: center; justify-content: space-between;
      gap: 1rem;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, var(--screen2), var(--screen));
    }

    .card-url {
      font-size: 0.82rem;
      color: var(--amber-hi);
      font-family: var(--mono);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
      direction: ltr;
      text-align: right;
    }
    .card-url::before { content: '$ '; color: var(--text3); }

    .status-badge {
      display: flex; align-items: center; gap: 0.4rem;
      padding: 0.28rem 0.6rem;
      border-radius: var(--radius-sm);
      font-size: 0.68rem;
      font-family: var(--mono);
      font-weight: 700;
      letter-spacing: 0.03em;
      flex-shrink: 0;
    }
    .status-badge.up {
      background: var(--green-glow); color: var(--green);
      border: 1px solid rgba(61,255,122,0.3);
    }
    .status-badge.down {
      background: var(--red-glow); color: var(--red);
      border: 1px solid rgba(255,59,59,0.35);
      animation: alarmText 1s steps(1) infinite;
    }
    @keyframes alarmText { 0%, 60% { opacity: 1; } 80% { opacity: 0.55; } 100% { opacity: 1; } }
    .status-badge.unknown {
      background: var(--amber-glow); color: var(--amber);
      border: 1px solid rgba(255,179,0,0.3);
    }

    .pulse { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .pulse.up   { background: var(--green); box-shadow: 0 0 0 0 rgba(61,255,122,0.4);  animation: pulseGreen 2s infinite; }
    .pulse.down { background: var(--red);   box-shadow: 0 0 0 0 rgba(255,59,59,0.5);  animation: pulseRed 1.1s infinite; }

    @keyframes pulseGreen {
      0%   { box-shadow: 0 0 0 0 rgba(61,255,122,0.5); }
      70%  { box-shadow: 0 0 0 7px rgba(61,255,122,0); }
      100% { box-shadow: 0 0 0 0 rgba(61,255,122,0); }
    }
    @keyframes pulseRed {
      0%   { box-shadow: 0 0 0 0 rgba(255,59,59,0.6); }
      70%  { box-shadow: 0 0 0 7px rgba(255,59,59,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,59,59,0); }
    }

    /* ── METRICS GRID ── */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--line);
    }

    .metric {
      background: var(--screen);
      padding: 0.85rem 1.05rem;
      display: flex; flex-direction: column; gap: 0.22rem;
      transition: background 0.15s;
    }
    .metric:hover { background: var(--screen2); }

    .metric-label {
      font-size: 0.62rem;
      color: var(--text3);
      font-family: var(--mono);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .metric-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      font-family: var(--mono);
      line-height: 1.15;
    }
    .metric-value.good  { color: var(--green); text-shadow: 0 0 10px var(--green-glow); }
    .metric-value.warn  { color: var(--yellow); }
    .metric-value.bad   { color: var(--red);   text-shadow: 0 0 10px var(--red-glow); }
    .metric-value.amber { color: var(--amber); text-shadow: 0 0 10px var(--amber-glow); }
    .metric-value.mono  { font-family: var(--mono); font-size: 0.92rem; }

    .metric-sub {
      font-size: 0.62rem;
      color: var(--text3);
      font-family: var(--arabic);
    }

    /* ── SPARKLINE ── */
    .sparkline-row {
      padding: 0.75rem 1.05rem;
      border-top: 1px solid var(--line);
    }
    .sparkline-label {
      font-size: 0.62rem;
      color: var(--text3);
      font-family: var(--mono);
      letter-spacing: 0.03em;
      margin-bottom: 0.5rem;
    }
    .sparkline-bars {
      display: flex; gap: 2px; align-items: flex-end;
      height: 26px; direction: ltr;
    }
    .spark-bar {
      flex: 1;
      border-radius: 1px;
      min-height: 3px;
      transition: opacity 0.2s;
    }
    .spark-bar:hover { opacity: 0.7; }
    .spark-bar.up   { background: var(--amber); box-shadow: 0 0 4px var(--amber-glow); }
    .spark-bar.down { background: var(--red); }
    .spark-bar.none { background: var(--line2); }

    /* ── CARD FOOTER ── */
    .card-footer {
      padding: 0.65rem 1.05rem;
      border-top: 1px solid var(--line);
      display: flex; align-items: center; justify-content: space-between;
      background: var(--bezel);
    }
    .footer-time {
      font-size: 0.66rem; color: var(--text3);
      font-family: var(--mono); direction: ltr; text-align: right;
    }
    .footer-time::before { content: '>> '; }
    .footer-dev {
      font-size: 0.68rem; color: var(--text3);
      display: flex; align-items: center; gap: 0.3rem;
      font-family: var(--mono);
    }

    /* ── DOWN ALERT BANNER: siren ── */
    .down-banner {
      position: relative;
      background: var(--screen);
      border: 1px solid rgba(255,59,59,0.45);
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 1rem;
      overflow: hidden;
      animation: bannerIn 0.3s ease both, alarmBorder 1.4s ease-in-out infinite;
    }
    @keyframes alarmBorder {
      0%, 100% { box-shadow: 0 0 0 rgba(255,59,59,0); }
      50%      { box-shadow: 0 0 26px rgba(255,59,59,0.22), inset 0 0 20px rgba(255,59,59,0.06); }
    }
    @keyframes bannerIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }

    .down-banner-icon { font-size: 1.3rem; filter: grayscale(0.2); animation: alarmText 1s steps(1) infinite; }
    .down-banner-text { flex: 1; }
    .down-banner-title {
      font-size: 0.88rem; font-weight: 700; color: var(--red);
      margin-bottom: 0.15rem;
      font-family: var(--mono);
    }
    .down-banner-detail { font-size: 0.76rem; color: var(--text2); }

    /* ── EMPTY / LOADING ── */
    .state-box { text-align: center; padding: 5rem 2rem; color: var(--text3); }
    .state-box .icon { font-size: 2.4rem; margin-bottom: 1rem; display: block; }
    .state-box p { font-size: 0.92rem; max-width: 280px; margin: 0 auto; line-height: 1.6; font-family: var(--arabic); }

    .spinner {
      position: relative;
      width: 40px; height: 40px;
      margin: 0 auto 1.1rem;
      border-radius: 50%;
      border: 1px solid var(--line2);
    }
    .spinner::before {
      content: '';
      position: absolute; inset: -1px;
      border-radius: 50%;
      background: conic-gradient(var(--amber) 0deg, transparent 60deg, transparent 360deg);
      animation: spin 1s linear infinite;
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--line2); border-radius: 3px; }

    button:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .summary-bar { grid-template-columns: repeat(2, 1fr); }
      .cards-grid  { grid-template-columns: 1fr; }
      header       { padding: 1.1rem; flex-wrap: wrap; gap: 0.75rem; }
      main         { padding: 1.1rem; }
      .summary-item { padding: 0.9rem 1.1rem; }
      .summary-value { font-size: 1.6rem; }
      .metrics-grid { grid-template-columns: repeat(2, 1fr); }
      .ekg-strip { height: 40px; }
      .ekg-track, .ekg-track svg { height: 40px; }
    }
  </style>
</head>
<body>

<div class="ambient"></div>
<div class="crt"></div>
<div class="flicker"></div>

<!-- ── HEADER ── -->
<header>
  <div class="logo">
    <div class="logo-mark-wrap">
      <div class="logo-mark">ر</div>
    </div>
    <div>
      <div class="logo-text-row">
        <span class="logo-text">راقب</span>
        <span class="logo-cursor"></span>
      </div>
      <div class="logo-sub">root@raqib:~$ monitor --live</div>
    </div>
  </div>
  <div class="header-right">
    <span class="live-chip"><span class="live-dot"></span>LIVE</span>
    <span class="last-update" id="lastUpdate">جاري التحميل...</span>
    <button class="refresh-btn" onclick="loadDashboard()">
      <span id="refreshIcon">↺</span>
      <span>[ تحديث ]</span>
    </button>
  </div>
</header>

<!-- ── EKG SIGNATURE STRIP ── -->
<div class="ekg-strip">
  <div class="ekg-track">
    <svg viewBox="0 0 2000 54" preserveAspectRatio="none">
      <polyline fill="none" stroke="var(--amber)" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"
        points="0,27 140,27 165,27 180,8 195,46 210,27 250,27 420,27 445,27 460,10 475,44 490,27 530,27 700,27 725,27 740,8 755,46 770,27 810,27 980,27 1005,27 1020,10 1035,44 1050,27 1090,27 1260,27 1285,27 1300,8 1315,46 1330,27 1370,27 1540,27 1565,27 1580,10 1595,44 1610,27 1650,27 1820,27 1845,27 1860,8 1875,46 1890,27 1930,27 2000,27"/>
    </svg>
    <svg viewBox="0 0 2000 54" preserveAspectRatio="none">
      <polyline fill="none" stroke="var(--amber)" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"
        points="0,27 140,27 165,27 180,8 195,46 210,27 250,27 420,27 445,27 460,10 475,44 490,27 530,27 700,27 725,27 740,8 755,46 770,27 810,27 980,27 1005,27 1020,10 1035,44 1050,27 1090,27 1260,27 1285,27 1300,8 1315,46 1330,27 1370,27 1540,27 1565,27 1580,10 1595,44 1610,27 1650,27 1820,27 1845,27 1860,8 1875,46 1890,27 1930,27 2000,27"/>
    </svg>
  </div>
</div>

<!-- ── SUMMARY BAR ── -->
<div class="summary-bar" id="summaryBar">
  <div class="summary-item">
    <span class="summary-label">إجمالي المواقع</span>
    <span class="summary-value amber" id="sumTotal">—</span>
  </div>
  <div class="summary-item">
    <span class="summary-label">شغّالة دلوقتي</span>
    <span class="summary-value green" id="sumUp">—</span>
  </div>
  <div class="summary-item">
    <span class="summary-label">واقعة دلوقتي</span>
    <span class="summary-value red" id="sumDown">—</span>
  </div>
  <div class="summary-item">
    <span class="summary-label">فلوس اتهدرت النهارده</span>
    <span class="summary-value amber" id="sumMoney">—</span>
  </div>
</div>

<!-- ── MAIN ── -->
<main>
  <div id="alertsZone"></div>
  <div class="section-title"><span class="prompt">&gt;_</span> مواقعك الإلكترونية <span class="blink"></span></div>
  <div class="cards-grid" id="cardsGrid">
    <div class="state-box" style="grid-column:1/-1">
      <div class="spinner"></div>
      <p>بنجيب البيانات دلوقتي…</p>
    </div>
  </div>
</main>

<script>
// ⚠️ استبدل هذا برابط الـ API بتاعك من Terraform
const API_URL = "https://wzoi8ew27l.execute-api.eu-north-1.amazonaws.com/prod/dashboard";

// ── Helpers ──────────────────────────────────────────────

function fmtUrl(url) {
  try { return new URL(url).hostname; } catch { return url; }
}

function fmtLatency(ms) {
  if (ms == null) return "—";
  return ms + " ms";
}

function fmtMoney(val) {
  const n = parseFloat(val);
  if (!val || isNaN(n)) return "٠ جنيه";
  return n.toFixed(2) + " جنيه";
}

function fmtUptime(val) {
  if (!val || val === "") return "—";
  const n = parseFloat(val);
  return isNaN(n) ? "—" : n.toFixed(1) + "%";
}

function fmtDowntime(mins) {
  if (mins == null) return "٠ دقيقة";
  if (mins < 60) return mins + " دقيقة";
  const h = Math.floor(mins / 60), m = mins % 60;
  return h + " ساعة" + (m ? " و" + m + " دقيقة" : "");
}

function fmtSSLDays(days) {
  if (days == null) return "—";
  if (days < 0) return "منتهي!";
  if (days === 0) return "بكره!";
  return days + " يوم";
}

function sslClass(days) {
  if (days == null) return "";
  if (days < 0)  return "bad";
  if (days <= 14) return "bad";
  if (days <= 30) return "warn";
  return "good";
}

function uptimeClass(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return "";
  if (n >= 99)  return "good";
  if (n >= 95)  return "warn";
  return "bad";
}

function moneyClass(val) {
  const n = parseFloat(val);
  if (isNaN(n) || n === 0) return "good";
  if (n < 50) return "warn";
  return "bad";
}

function latencyClass(ms) {
  if (ms == null) return "";
  if (ms < 500)  return "good";
  if (ms < 1500) return "warn";
  return "bad";
}

function speedEmoji(verdict) {
  if (!verdict) return "";
  if (verdict.includes("Fast") || verdict.includes("سريع")) return "⚡";
  if (verdict.includes("Acceptable"))  return "✓";
  if (verdict.includes("Slow"))        return "🐢";
  if (verdict.includes("unreachable")) return "✕";
  return "";
}

function speedArabic(verdict) {
  if (!verdict) return "—";
  const map = {
    "Fast":                        "⚡ سريع",
    "Acceptable":                  "✓ مقبول",
    "Slow — visitors may leave":   "🐢 بطيء — الزباين بتمشي",
    "Very slow — losing customers":"🔴 بطيء جداً",
    "Site unreachable":            "✕ مش وصّال"
  };
  return map[verdict] || verdict;
}

// ── Sparkline ────────────────────────────────────────────

function buildSparkline(sparkline) {
  if (!sparkline || sparkline.length === 0) {
    return '<div style="color:var(--text3);font-size:0.7rem">مفيش بيانات تاريخية لسه</div>';
  }
  const maxMs = Math.max(...sparkline.map(s => s.ms || 0), 1);
  return sparkline.map(s => {
    if (s.s === "DOWN" || !s.ms) {
      return `<div class="spark-bar down" style="height:4px" title="وقعت"></div>`;
    }
    const h = Math.max(4, Math.round((s.ms / maxMs) * 28));
    return `<div class="spark-bar up" style="height:${h}px" title="${s.ms}ms"></div>`;
  }).join("");
}

// ── Card Builder ─────────────────────────────────────────

function buildCard(site, idx) {
  const isDown    = site.status === "DOWN";
  const statusTxt = isDown ? "واقع" : (site.status === "UP" ? "شغّال" : "مجهول");
  const statusCls = isDown ? "down" : (site.status === "UP" ? "up" : "unknown");

  const sslIcon   = site.ssl_valid === true ? "🔒" : (site.ssl_valid === false ? "⚠️" : "—");

  return `
<div class="site-card ${isDown ? 'is-down' : ''}" style="animation-delay:${idx * 0.06}s">

  <div class="card-header">
    <div>
      <div class="card-url" title="${site.website_url}">${fmtUrl(site.website_url)}</div>
    </div>
    <div class="status-badge ${statusCls}">
      <span class="pulse ${statusCls}"></span>
      ${statusTxt}
    </div>
  </div>

  <div class="metrics-grid">

    <div class="metric">
      <div class="metric-label">الاتاحة (٢٤ ساعة)</div>
      <div class="metric-value ${uptimeClass(site.uptime_24h_pct)}">${fmtUptime(site.uptime_24h_pct)}</div>
    </div>

    <div class="metric">
      <div class="metric-label">سرعة الاستجابة</div>
      <div class="metric-value ${latencyClass(site.avg_latency_ms)} mono">${fmtLatency(site.avg_latency_ms)}</div>
      <div class="metric-sub">${speedArabic(site.speed_verdict)}</div>
    </div>

    <div class="metric">
      <div class="metric-label">وقت العطل النهارده</div>
      <div class="metric-value ${site.downtime_minutes_24h > 0 ? 'bad' : 'good'}">${fmtDowntime(site.downtime_minutes_24h)}</div>
    </div>

    <div class="metric">
      <div class="metric-label">فلوس اتهدرت النهارده</div>
      <div class="metric-value ${moneyClass(site.money_wasted_24h)}">${fmtMoney(site.money_wasted_24h)}</div>
      <div class="metric-sub">من إعلانات على موقع واقع</div>
    </div>

    <div class="metric">
      <div class="metric-label">شهادة الأمان SSL</div>
      <div class="metric-value ${sslClass(site.ssl_days_remaining)}">${sslIcon} ${fmtSSLDays(site.ssl_days_remaining)}</div>
      <div class="metric-sub">${site.ssl_expiry_date ? 'تنتهي ' + site.ssl_expiry_date : (site.ssl_valid === false ? 'مفيش شهادة!' : '')}</div>
    </div>

    <div class="metric">
      <div class="metric-label">بينجات فاشلة</div>
      <div class="metric-value ${site.failed_pings > 0 ? 'bad' : 'good'}">${site.failed_pings ?? '٠'} / ${site.total_pings ?? 3}</div>
      <div class="metric-sub">آخر فحص</div>
    </div>

  </div>

  <div class="sparkline-row">
    <div class="sparkline-label">أداء آخر ٢٤ ساعة</div>
    <div class="sparkline-bars">${buildSparkline(site.sparkline)}</div>
  </div>

  <div class="card-footer">
    <div class="footer-dev">👨‍💻 ${site.dev_phone || "—"}</div>
    <div class="footer-time">${site.checked_at_cairo || "—"}</div>
  </div>

</div>`;
}

// ── Alerts Zone ──────────────────────────────────────────

function buildAlerts(sites) {
  const downSites = sites.filter(s => s.status === "DOWN");
  if (downSites.length === 0) return "";

  return downSites.map(s => `
    <div class="down-banner">
      <div class="down-banner-icon">🚨</div>
      <div class="down-banner-text">
        <div class="down-banner-title">${fmtUrl(s.website_url)} — واقع دلوقتي!</div>
        <div class="down-banner-detail">
          عطل مستمر ${fmtDowntime(s.downtime_minutes_24h)} النهارده
          ${parseFloat(s.money_wasted_24h) > 0 ? ' · اتهدر ' + fmtMoney(s.money_wasted_24h) + ' من إعلاناتك' : ''}
          · المطور: ${s.dev_phone || "—"}
        </div>
      </div>
    </div>`
  ).join("");
}

// ── Load Dashboard ───────────────────────────────────────

async function loadDashboard() {
  const grid        = document.getElementById("cardsGrid");
  const alertsZone  = document.getElementById("alertsZone");
  const refreshIcon = document.getElementById("refreshIcon");
  const lastUpdate  = document.getElementById("lastUpdate");

  refreshIcon.style.animation = "spin 0.7s linear infinite";

  try {
    const res  = await fetch(API_URL);
    const data = await res.json();
    const sites = data.sites || [];

    // Summary bar
    document.getElementById("sumTotal").textContent = sites.length;
    document.getElementById("sumUp").textContent    = data.up_count   ?? 0;
    document.getElementById("sumDown").textContent  = data.down_count ?? 0;

    const totalMoney = sites.reduce((acc, s) => acc + (parseFloat(s.money_wasted_24h) || 0), 0);
    document.getElementById("sumMoney").textContent = totalMoney.toFixed(2) + " جنيه";

    // Alerts
    alertsZone.innerHTML = buildAlerts(sites);

    // Cards
    if (sites.length === 0) {
      grid.innerHTML = `
        <div class="state-box" style="grid-column:1/-1">
          <span class="icon">🌐</span>
          <p>مفيش مواقع مسجّلة لسه.<br/>سجّل موقعك الأول من الصفحة الرئيسية.</p>
        </div>`;
    } else {
      grid.innerHTML = sites.map((s, i) => buildCard(s, i)).join("");
    }

    const now = new Date();
    lastUpdate.textContent = "آخر تحديث: " + now.toLocaleTimeString("ar-EG");

  } catch (err) {
    console.error(err);
    alertsZone.innerHTML = "";
    grid.innerHTML = `
      <div class="state-box" style="grid-column:1/-1">
        <span class="icon">⚠️</span>
        <p>مقدرناش نجيب البيانات.<br/>تأكد من رابط الـ API في الكود.</p>
      </div>`;
    lastUpdate.textContent = "فشل التحديث";
  } finally {
    refreshIcon.style.animation = "";
  }
}

// ── Auto-refresh every 5 minutes ─────────────────────────
loadDashboard();
setInterval(loadDashboard, 5 * 60 * 1000);
</script>
</body>
</html>
